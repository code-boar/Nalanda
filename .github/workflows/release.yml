name: Release

# On a v* tag: verify the tag matches the pyproject version, pull the matching CHANGELOG
# section as the notes, and create the GitHub Release. The image is published separately by
# docker-publish.yml, which also fires on the tag.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version and extract release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          proj="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$version" != "$proj" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $proj"
            exit 1
          fi
          # Literal string matching (no regex) so it behaves the same across awk variants.
          awk -v want="## [$version]" '
            index($0, want) == 1 { flag = 1; next }
            substr($0, 1, 4) == "## [" { if (flag) flag = 0 }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::No CHANGELOG section found for $version"
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in *-*) prerelease="--prerelease" ;; esac
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            $prerelease
