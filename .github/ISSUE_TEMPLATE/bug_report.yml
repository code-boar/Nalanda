name: Bug report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more of the below you can fill in, the
        faster it can be diagnosed.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I removed any API keys, tokens, or other secrets from the config and logs below.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: The collection or settings block involved, with secrets removed.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output, ideally from a `--dry-run`, with secrets removed.
      render: shell
  - type: input
    id: version
    attributes:
      label: Nalanda version
      description: The image tag, or the commit if running from source.
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running Nalanda?
      options:
        - Docker
        - From source (uv)
    validations:
      required: true
  - type: input
    id: jellyfin
    attributes:
      label: Jellyfin version
    validations:
      required: true
